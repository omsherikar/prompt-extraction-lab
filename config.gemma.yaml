# Cross-model run on gemma3:12b (a fourth model that, on smoke tests, leaks readily like
# qwen3-coder). FULL matrix: 9 prompts (direct + role + in_context) x 12 attacks x 3 defenses x 2
# repeats = ~648 calls, symmetric with the gpt-oss:120b and qwen3-coder runs, written to its own
# dir. run_full is crash-safe.
# NB: the larger gemma3:27b was throttled to ~30s+/call on the free tier (a 648-run timed out
# after 8h); gemma3:12b is the same family, ~1.6s/call, and leaks just as readily.
#   python3 -m src.experiment.run --config config.gemma.yaml
seed: 1729

models:
  - provider: ollama
    model_id: gemma3:12b
    temperature: 0.0

query_budget: 20

repeats: 2

normalization:
  lowercase: true
  collapse_whitespace: true
  strip: true

prompt_types: [direct, role, in_context]

defenses:
  - none
  - instructional
  - output_filter

output_filter_threshold: 0.5

output:
  results_dir: data/results/run-gemma
  transcripts_dir: data/transcripts
