# Cross-model run on qwen3-coder (which leaks readily, unlike gpt-oss). FULL matrix: all 9
# prompts (direct + role + in_context) x 12 attacks x 3 defenses x 2 repeats = ~648 calls,
# symmetric with the gpt-oss:120b run, written to its own dir. run_full is crash-safe.
#   python3 -m src.experiment.run --config config.qwen.yaml
seed: 1729

models:
  - provider: ollama
    model_id: qwen3-coder:480b-cloud
    temperature: 0.0

query_budget: 20

repeats: 2

normalization:
  lowercase: true
  collapse_whitespace: true
  strip: true

prompt_types: [direct, role, in_context]

defenses:
  - none
  - instructional
  - output_filter

output_filter_threshold: 0.5

output:
  results_dir: data/results/run-qwen
  transcripts_dir: data/transcripts
